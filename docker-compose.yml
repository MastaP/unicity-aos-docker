# Unicity AOS Community Edition — container runtime.
#
#   cp .env.example .env                 # then fill in the secrets
#   mkdir -p data && chmod 700 data
#   docker compose up -d --build
#   docker compose exec aos astrid -p "hello"
#
# All credentials live in .env (gitignored) and are passed at runtime; nothing
# secret is ever baked into the image.

services:
  aos:
    build:
      context: .
      # `runtime` is the slim production image (no compiler). Set
      # AOS_IMAGE_TARGET=devtools to get a toolchain in the container so
      # `astrid capsule build` works in-place — see the Dockerfile stage 3.
      target: ${AOS_IMAGE_TARGET:-runtime}
      args:
        # Pin to tags or commits for a reproducible image; `main` tracks tip.
        AOS_CE_REF: ${AOS_CE_REF:-main}
        TELEGRAM_REF: ${TELEGRAM_REF:-main}
    # Tag by target so the slim and devtools images don't overwrite each other.
    image: aos-ce:2026.1.3-${AOS_IMAGE_TARGET:-runtime}
    container_name: aos
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # ALL runtime state lives here: runtime keys, secrets, KV, sessions, the
      # audit chain, installed capsules, and anything an agent builds with
      # Forge.
      #
      # This is a BIND MOUNT to a directory on the host, deliberately not a
      # named Docker volume. A named volume is invisible in the filesystem and
      # is destroyed by `docker compose down -v` — which is an easy command to
      # reach for, and takes every agent-authored capsule with it. A host
      # directory survives `down -v`, can be backed up with cp/rsync/git, and
      # can be inspected without a container.
      #
      # The container runs as uid/gid 1000; the host directory must be owned by
      # the same uid:
      #   mkdir -p data && chmod 700 data
      # If your host user is not uid 1000, also: chown 1000:1000 data
      - ${AOS_DATA_DIR:-./data}:/home/aos/.astrid
    # NOTE: aos-shell sandboxes the processes it spawns with bubblewrap, which
    # needs nested unprivileged user namespaces that Docker's default seccomp +
    # AppArmor profiles block. This container runs CONFINED (no relaxations), so
    # aos-shell tool calls fail with a namespace error — the agent cannot run
    # host shell commands here. That is the deliberate, safe default.
    #
    # Building capsules inside the container does NOT need aos-shell: use the
    # operator path, which runs in the container's normal namespace:
    #   docker compose exec aos astrid capsule build <path> --output <dir>
    #   docker compose exec aos astrid capsule install <dir>/<name>.capsule
    #
    # Enabling agent-run shell commands would require adding, at minimum:
    #   security_opt: [seccomp=unconfined, apparmor=unconfined, systempaths=unconfined]
    #   cap_add: [SYS_ADMIN]
    # which removes most of Docker's isolation. Even then, agent-autonomous
    # *builds* do not work: aos-shell executes each command in a fresh, ephemeral
    # sandbox with no filesystem persistence between calls, so a multi-step build
    # cannot share state. Left commented on purpose.
    healthcheck:
      # Deliberately NOT `astrid status`. That command is a CLI socket client,
      # and the kernel treats the last client disconnect as the end of a
      # session: `connection_closed` -> `clear_session_allowances`, which drops
      # every `session_only` approval for the principal. A healthcheck on a
      # timer would therefore revoke the agent's "allow for this session" grants
      # on every tick — and because an uplink capsule holds no client
      # connection, the healthcheck is usually the ONLY connection, so it
      # single-handedly starts and ends the principal's session each interval.
      #
      # Reading the daemon's own liveness markers opens no connection, and is a
      # stronger check besides: it proves the process is alive and marked ready,
      # not merely that something answered on a socket.
      test:
        - CMD-SHELL
        - >-
          h=$${ASTRID_HOME:-/home/aos/.astrid};
          p=$$(head -1 "$$h/run/system.pid" 2>/dev/null);
          [ -n "$$p" ] && [ -d "/proc/$$p" ] && [ -f "$$h/run/system.ready" ]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
